# Block 1: Chuyển hướng từ HTTP sang HTTPS
server {
    listen 80;
    server_name securedoc.xyz www.securedoc.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Block 2: Cấu hình HTTPS chính
server {
    listen 443 ssl;
    server_name securedoc.xyz www.securedoc.xyz;

    # Đường dẫn chứng chỉ (đã map volume)
    ssl_certificate /etc/letsencrypt/live/securedoc.xyz/fullchain.pem; # THAY TÊN MIỀN
    ssl_certificate_key /etc/letsencrypt/live/securedoc.xyz/privkey.pem; # THAY TÊN MIỀN

    # Tối ưu bảo mật SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 1. Frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 2. Backend API
    location /api/ {
        proxy_pass http://backend:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 3. WebSocket
    location /ws {
        proxy_pass http://backend:8888/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

