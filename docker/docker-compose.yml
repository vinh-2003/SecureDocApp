version: '3.8'

services:
  # ==========================================
  # INFRASTRUCTURE (DATABASE & SEARCH)
  # ==========================================

  # 1. MongoDB
  mongodb:
    image: mongo:6.0
    container_name: doc_mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - TZ=${TZ}
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT}:27017"
    networks:
      - doc_network
    restart: unless-stopped

  # 2. Mongo Express (Giao diện quản lý DB)
  mongo-express:
    image: mongo-express
    container_name: doc_mongo_express
    ports:
      - "${MONGO_EXPRESS_PORT}:8081"
    environment:
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_ROOT_USER}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_ROOT_PASSWORD}
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_ROOT_USER}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_ROOT_PASSWORD}
      - ME_CONFIG_MONGODB_AUTH_DATABASE=admin
    depends_on:
      - mongodb
    networks:
      - doc_network
    restart: always

  # 3. Elasticsearch (Tìm kiếm & Vector)
  elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile.elasticsearch
    container_name: doc_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - TZ=${TZ}
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTIC_PORT}:9200"
    networks:
      - doc_network
    restart: unless-stopped

  # 4. Kibana (Giao diện Elasticsearch)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.7.0
    container_name: doc_kibana
    ports:
      - "5699:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
    depends_on:
      - elasticsearch
    networks:
      - doc_network
    restart: unless-stopped

  # ==========================================
  # AI SERVICES (XỬ LÝ FILE)
  # ==========================================

  # 5. Tika (Đọc văn bản từ PDF/Word)
  tika:
    build:
      context: .
      dockerfile: Dockerfile.tika
    container_name: doc_tika
    ports:
      - "${TIKA_PORT}:9998"
    networks:
      - doc_network
    restart: unless-stopped

  # 6. CLIP Server (Vector hóa hình ảnh & text)
  clip-server:
    image: jinaai/clip-server:latest
    container_name: doc_clip_server
    # Lệnh chỉ trỏ tới file config, không dùng flags [1]
    command: ["/flow.yml"] 
    ports:
      - "${CLIP_PORT}:51000"
    volumes:
      # 1. Mount file cấu hình vào trong container
      - ./flow.yml:/flow.yml
      # 2. Mount thư mục cache của máy host để lưu model đã tải [5]
      - ./clip_cache:/home/cas/.cache
    networks:
      - doc_network
    restart: unless-stopped
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1 # Số lượng GPU muốn dùng (hoặc 'all')
              capabilities: [gpu]

  # 7. Whisper (Chuyển giọng nói thành văn bản)
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: doc_whisper
    ports:
      - "${WHISPER_PORT}:8000"
    environment:
      - WHISPER_MODEL=small
      - WHISPER_LANGUAGE=vi
    volumes:
      - whisper_models:/root/.cache/huggingface
    networks:
      - doc_network
    restart: unless-stopped
  # # ==========================================
  # # BACKEND (Spring Boot)
  # # ==========================================
  backend:
    container_name: doc_backend
    build:
      context: ../backend
      dockerfile: Dockerfile
    # build pro -> cmt
    ports:
      - "${BACKEND_PORT}:8888"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB_NAME}?authSource=admin
      - SPRING_ELASTICSEARCH_URIS=http://elastic:${ELASTIC_PASSWORD}@elasticsearch:9200
      
      # App Config
      - APP_FRONTEND_URL=${APP_FRONTEND_URL} # Dùng cho CORS hoặc redirect
      - APP_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - APP_JWT_SECRET=${JWT_SECRET}
      - APP_SECURITY_MASTER_KEY=${SECURITY_MASTER_KEY}
      
      # Mail Config
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
      
      # AI Services (Internal Docker Network)
      - APP_TIKA_URL=http://tika:9998
      - APP_CLIP_URL=http://clip-server:51000
      - APP_WHISPER_URL=http://whisper:8000

      - TZ=${TZ}
      - JAVA_TOOL_OPTIONS=-Duser.timezone=Asia/Ho_Chi_Minh
      - SPRING_JACKSON_TIME_ZONE=Asia/Ho_Chi_Minh
    depends_on:
      - mongodb
      - elasticsearch
      - tika
      - clip-server
      - whisper
    networks:
      - doc_network
    restart: always

  # # ==========================================
  # # FRONTEND (React + Nginx nội bộ)
  # # ==========================================
  frontend:
    container_name: doc_frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${APP_API_URL}
        - REACT_APP_BACKEND_URL=${APP_BACKEND_URL}
        - REACT_APP_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - TZ=${TZ}
    # build pro -> cmt
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - doc_network

  # # ==========================================
  # # GATEWAY (NGINX - Cổng chính)
  # # ==========================================
  # nginx-gateway:
  #   image: nginx:alpine
  #   container_name: doc_gateway
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx-gateway.conf:/etc/nginx/conf.d/default.conf
  #     - ./certbot/conf:/etc/letsencrypt # Chứa chứng chỉ SSL
  #     - ./certbot/www:/var/www/certbot  # Chứa file xác thực
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - doc_network

  # # ==========================================
  # # CERTBOT
  # # ==========================================
  # certbot:
  #   image: certbot/certbot
  #   container_name: doc_certbot
  #   volumes:
  #     - ./certbot/conf:/etc/letsencrypt
  #     - ./certbot/www:/var/www/certbot
  #   networks:
  #     - doc_network

volumes:
  mongo_data:
  es_data:
  whisper_models:


networks:
  doc_network:
    driver: bridge
