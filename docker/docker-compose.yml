version: '3.8'

services:
  # # ==========================================
  # # GATEWAY (NGINX - Cổng chính)
  # # ==========================================
  # nginx-gateway:
  #   image: nginx:alpine
  #   container_name: doc_gateway
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx-gateway.conf:/etc/nginx/conf.d/default.conf
  #     - ./certbot/conf:/etc/letsencrypt # Chứa chứng chỉ SSL
  #     - ./certbot/www:/var/www/certbot  # Chứa file xác thực
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - doc_network

  # # ==========================================
  # # CERTBOT
  # # ==========================================
  # certbot:
  #   image: certbot/certbot
  #   container_name: doc_certbot
  #   volumes:
  #     - ./certbot/conf:/etc/letsencrypt
  #     - ./certbot/www:/var/www/certbot
  #   networks:
  #     - doc_network

  # # ==========================================
  # # BACKEND (Spring Boot)
  # # ==========================================
  backend:
    container_name: doc_backend
    build:
      context: ../backend
      dockerfile: Dockerfile
    # build pro -> cmt
    ports:
      - "8888:8888"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://admin:admin_password@mongodb:27017/doc_management_db?authSource=admin
      - SPRING_ELASTICSEARCH_URIS=http://elastic:dyLuGaROSNhYQ9Jvq9vD@elasticsearch:9200
      - APP_FRONTEND_URL=http://localhost:3030
      - APP_GOOGLE_CLIENT_ID=352828339396-mtu0rcf8j5i5e137lhb94rnj8m9selnm.apps.googleusercontent.com
      - TZ=Asia/Ho_Chi_Minh
      - JAVA_TOOL_OPTIONS=-Duser.timezone=Asia/Ho_Chi_Minh
      - SPRING_JACKSON_TIME_ZONE=Asia/Ho_Chi_Minh
    depends_on:
      - mongodb
      - elasticsearch
    networks:
      - doc_network
    restart: always

  # # ==========================================
  # # FRONTEND (React + Nginx nội bộ)
  # # ==========================================
  # frontend:
  #   container_name: doc_frontend
  #   build:
  #     context: ../frontend
  #     dockerfile: Dockerfile
  #     args:
  #       - REACT_APP_API_URL=http://localhost:3030/api 
  #       - REACT_APP_BACKEND_URL=http://localhost:3030
  #       - REACT_APP_GOOGLE_CLIENT_ID=352828339396-mtu0rcf8j5i5e137lhb94rnj8m9selnm.apps.googleusercontent.com
  #       - TZ=Asia/Ho_Chi_Minh
  #   # ports: <-- ĐÃ BỎ (Chạy ngầm)
  #   #   - "3030:80"
  #   depends_on:
  #     - backend
  #   networks:
  #     - doc_network

  # ==========================================
  # INFRASTRUCTURE
  # ==========================================
  mongodb:
    image: mongo:6.0
    container_name: doc_mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin_password
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - mongo_data:/data/db
    # build pro -> cmt
    ports:
      - 27017:27017
    networks:
      - doc_network

  mongo-express:
    image: mongo-express
    container_name: doc_mongo_express
    restart: always
    ports:
      - "8099:8081"
    environment:
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin_password
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=admin_password
      - ME_CONFIG_MONGODB_AUTH_DATABASE=admin
    depends_on:
      - mongodb
    networks:
      - doc_network

  elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile.elasticsearch
    container_name: doc_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - es_data:/usr/share/elasticsearch/data
    # build pro -> cmt
    ports:
      - 9200:9200
    networks:
      - doc_network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.7.0
    container_name: doc_kibana
    ports:
      - "5699:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=UFfpmkK03SsmNkQ8F03u
    depends_on:
      - elasticsearch
    networks:
      - doc_network

volumes:
  mongo_data:
  es_data:

networks:
  doc_network:
    driver: bridge