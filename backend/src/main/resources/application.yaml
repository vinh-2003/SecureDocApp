server:
  port: 8888 # Port của Backend

spring:
  application:
    name: secure-doc-backend

  cloud:
    openfeign:
      client:
        config:
          default:
            # Thời gian chờ kết nối (5 giây)
            connectTimeout: 5000
            # Thời gian chờ xử lý (10 phút) -> Fix lỗi Whisper Timeout
            readTimeout: 600000
            loggerLevel: basic

  # --- EMAIL CONFIGURATION (Gmail Example) ---
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:vinh9a72003@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:cxsf owsa punt jcqs}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # --- 1. MONGODB ---
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://admin:admin_password@localhost:27017/doc_management_db?authSource=admin}
      auto-index-creation: true # Tự động tạo index (@Indexed)

  # --- 2. ELASTICSEARCH ---
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
    socket-timeout: 10s
    connection-timeout: 5s
    username: elastic
    password: ${ELASTIC_PASSWORD:dyLuGaROSNhYQ9Jvq9vD}

  # --- 3. FILE UPLOAD LIMITS ---
  servlet:
    multipart:
      max-file-size: 100MB        # Kích thước tối đa 1 file
      max-request-size: 1GB     # Kích thước tối đa cả request

  # --- 4. JACKSON (JSON FORMAT) ---
  jackson:
    default-property-inclusion: non_null # Không trả về field null
    serialization:
      write-dates-as-timestamps: false # Trả về ngày dạng ISO String (2025-01-01...)

# --- 5. CUSTOM APP CONFIG ---
app:
  jwt:
    secret: ${APP_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970} # Chuỗi bí mật (64 bytes hex)
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}        # 1 giờ (Access Token)
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 ngày (Refresh Token)

  security:
    master-key: ${APP_SECURITY_MASTER_KEY:MY_SUPER_SECRET_MASTER_KEY_CHANGE_ME} # Dùng để mã hóa FileKey trong DB (Tạm thời để đây)

    # Cấu hình logic khóa tài khoản (Tránh hardcode trong Java)
    max-failed-attempts: 5                # Sai 5 lần thì khóa
    lock-time-duration-minutes: 30        # Khóa trong 30 phút
    token-expiration-minutes: 15          # Token xác thực/reset pass sống trong 15 phút

  frontend-url: ${APP_FRONTEND_URL:http://localhost:3030}

  trash:
    retention-days: 30

  activity-log:
    retention-days: 365

  log:
    retention-days: 30

  google:
    client-id: ${APP_GOOGLE_CLIENT_ID:352828339396-mtu0rcf8j5i5e137lhb94rnj8m9selnm.apps.googleusercontent.com}

  tika-url: ${APP_TIKA_URL:http://localhost:9998}
  clip-url: ${APP_CLIP_URL:http://localhost:51000}
  whisper-url: ${APP_WHISPER_URL:http://localhost:8000}