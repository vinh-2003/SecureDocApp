version: '3.8'

services:
  # MongoDB: Host 27099 -> Container 27017
  mongodb:
    image: mongo:6.0
    container_name: doc_mongodb
    ports:
      - "27099:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin_password
    volumes:
      - mongo_data:/data/db
    networks:
      - doc_network

  # Mongo Express: Host 8099 -> Container 8081
  mongo-express:
    image: mongo-express
    container_name: doc_mongo_express
    restart: always
    ports:
      - "8099:8081"
    environment:
      # 1. Cấu hình đăng nhập trên TRÌNH DUYỆT (Web Login)
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin_password

      # 2. Cấu hình kết nối tới SERVER MONGODB
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017

      # 3. Tài khoản Admin của MONGODB (Phải trùng với service mongodb bên trên)
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=admin_password
      - ME_CONFIG_MONGODB_AUTH_DATABASE=admin # Quan trọng: Xác thực qua db admin

    depends_on:
      - mongodb
    networks:
      - doc_network

  # Elasticsearch: Host 9299 -> Container 9200
  elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile.elasticsearch
    container_name: doc_elasticsearch
    ports:
      - "9299:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g" # Tăng RAM lên 1GB vì vi_analyzer tốn RAM hơn
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - doc_network

  # Kibana: Host 5699 -> Container 5601
  kibana:
    image: docker.elastic.co/kibana/kibana:8.7.0
    container_name: doc_kibana
    ports:
      - "5699:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - doc_network

volumes:
  mongo_data:
  es_data:

networks:
  doc_network:
    driver: bridge