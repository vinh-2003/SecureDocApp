server {
    listen 80;
    server_name your_domain_or_ip.com; # Thay bằng IP hoặc Domain của bạn

    # 1. Điều hướng Frontend
    location / {
        proxy_pass http://frontend:80; # Tên service trong docker-compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. Điều hướng Backend API
    location /api/ {
        # Lưu ý: Backend cần có context-path là /api hoặc rewrite tại đây
        proxy_pass http://backend:8888/api/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Cấu hình WebSocket (Cho tính năng thông báo file của bạn)
    location /ws {
        proxy_pass http://backend:8888/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}